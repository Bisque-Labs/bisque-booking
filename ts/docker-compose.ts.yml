version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bisque
      POSTGRES_PASSWORD: bisque
      POSTGRES_DB: bisque_booking
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bisque -d bisque_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bisque:bisque@db:5432/bisque_booking
      PORT: "3000"
      BASE_URL: "${BASE_URL:-http://localhost:3000}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-32-bytes!!}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
      SMTP_HOST: "${SMTP_HOST:-localhost}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_USE_TLS: "${SMTP_USE_TLS:-false}"
      SMTP_USE_STARTTLS: "${SMTP_USE_STARTTLS:-false}"
      FROM_EMAIL: "${FROM_EMAIL:-noreply@localhost}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
