# nginx snippet for bisque-booking
# Add this server block to your nginx config (e.g. /etc/nginx/sites-available/bisque-booking)
# then: nginx -t && systemctl reload nginx
#
# TLS certificates are issued by certbot:
#   certbot --nginx -d booking.yourdomain.com

server {
    listen 443 ssl;
    server_name booking.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/booking.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booking.yourdomain.com/privkey.pem;

    # Recommended TLS hardening (certbot usually adds these automatically)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name booking.yourdomain.com;
    return 301 https://$host$request_uri;
}
