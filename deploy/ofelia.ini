# Ofelia cron job configuration
# Sends 24h and 1h reminder emails for upcoming bookings.
# Runs every 15 minutes; the route is idempotent so overlapping runs are safe.

[job-exec "reminders"]
schedule  = @every 15m
container = bisque-booking-app-1
command   = sh -c 'curl -sf -X POST -H "Authorization: Bearer ${CRON_SECRET}" http://localhost:3000/api/cron/reminders'
no-overlap = true
