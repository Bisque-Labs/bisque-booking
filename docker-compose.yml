# bisque-booking — Docker Compose deployment
# Runs the Next.js 14 app with SQLite persistence and a lightweight cron runner.
#
# Quick start:
#   cp nextjs/.env.example .env && nano .env   # fill in required vars
#   docker compose up -d

services:
  app:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3200:3000"      # host:container — 3200 avoids conflicts with other local services
    volumes:
      - bisque_data:/app/data   # named volume for SQLite persistence
    env_file:
      - .env             # copy from nextjs/.env.example to .env at repo root
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cron:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: daemon --docker
    environment:
      # Ofelia reads job config from labels on other containers, but we can
      # also drive it via environment. We use a standalone ini approach here.
      OFELIA_LOG_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/ofelia.ini:/etc/ofelia.ini:ro
    # ofelia.ini references CRON_SECRET, pass it in so ofelia can substitute
    env_file:
      - .env

volumes:
  bisque_data:
    # Named volume — data persists across container restarts and rebuilds.
    # To back up: docker compose exec app sqlite3 /app/data/bookings.db .dump > backup.sql
