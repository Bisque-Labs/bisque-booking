{% extends "base.html" %}
{% block title %}Setup — bisque-booking{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-bold text-center mb-2">Welcome to bisque-booking</h1>
  <p class="text-gray-500 text-center text-sm mb-8">Create your admin account to get started.</p>

  <div class="bg-white border rounded-xl p-6 space-y-4">
    <form method="post" action="/setup" class="space-y-3">
      <div>
        <label class="block text-sm font-medium mb-1">Your name *</label>
        <input type="text" name="name" required placeholder="Sarah Smith"
               class="w-full border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Email *</label>
        <input type="email" name="email" required
               class="w-full border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password *</label>
        <input type="password" name="password" required minlength="8"
               class="w-full border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">
          Booking URL slug *
          <span class="text-gray-400 font-normal text-xs ml-1">(your-domain.com/sarah)</span>
        </label>
        <input type="text" name="slug" placeholder="sarah"
               pattern="[a-z0-9\-]+" title="Lowercase letters, numbers, hyphens only"
               class="w-full border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Timezone</label>
        <select name="timezone" class="w-full border rounded-lg px-3 py-2 text-sm">
          <option value="America/New_York">Eastern Time (ET)</option>
          <option value="America/Chicago">Central Time (CT)</option>
          <option value="America/Denver">Mountain Time (MT)</option>
          <option value="America/Los_Angeles">Pacific Time (PT)</option>
          <option value="Europe/London">London (GMT/BST)</option>
          <option value="Europe/Paris">Central European (CET)</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
        Create admin account
      </button>
    </form>
  </div>
</div>
{% endblock %}
